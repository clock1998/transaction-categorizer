name: Build and Deploy

on:
  push:
    branches: [ "master", "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: self-hosted
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up buildx (single-platform, with cache)
        uses: docker/setup-buildx-action@v3

      - id: meta
        name: Extract metadata (tags, labels)
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the full version (e.g. v1.2.3) when a git tag is pushed
            type=semver,pattern=v{{version}}
            # Keep your existing tags
            type=raw,value=latest
            # type=sha

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./TransactionCategorizer
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    runs-on: self-hosted
    needs: build
    # if: |
    #   startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up buildx (single-platform, with cache)
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./TransactionCategorizer
          push: true
          tags: ${{ needs.build.outputs.tags }}
          labels: ${{ needs.build.outputs.labels }}
          provenance: false # Prevent push the OCI artifact (like a provenance or SBOM file) 
          sbom: false # Prevent push the OCI artifact (like a provenance or SBOM file) 
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: push
    # Only run deploy on tag pushes or when a tag is provided to workflow_dispatch
    # if: |
    #   startsWith(github.ref, 'refs/tags/') 
    runs-on: self-hosted
    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG=${{ github.event.inputs.tag }}
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT


      - name: Create directory on remote server
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: 192.168.1.4
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p $HOME/transaction-categorizer

      - name: Copy docker-compose.yml to remote server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ./docker-compose.yml ${{ secrets.SERVER_USER }}@192.168.1.4:$HOME/transaction-categorizer/docker-compose.yml

      - name: Deploy via SSH Loopback
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: 192.168.1.4
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            export TAG=${{ steps.tag.outputs.tag }}
            export IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:$TAG
            export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            docker pull $IMAGE
            docker ps -aq --filter "name=transaction-categorizer" | xargs -r docker rm -f
            docker compose -f $HOME/transaction-categorizer/docker-compose.yml -p transaction-categorizer up -d --remove-orphans --force-recreate --no-build

      - name: Announce deployment
        run: |
          echo "Successfully deployed ${{ github.repository }}:${{ steps.tag.outputs.tag }} via SSH loopback"
