services:
  spikylin:
    image: ghcr.io/clock1998/transaction-categorizer:${TAG}
    ports:
      - 8080:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Gemini__Model=gemini-2.5-flash
    container_name: transaction-categorizer
    restart: always
