services:
  spikylin:
    image: ghcr.io/clock1998/transaction-categorizer:${TAG}
    ports:
      - 8080:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    container_name: transaction-categorizer
    restart: always
